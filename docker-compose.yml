version: '3.8'

services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/ravenpassword
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "ravenpassword", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  raven-core:
    build:
      context: .
      dockerfile: Dockerfile.core
    ports:
      - "4001:4001"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/raven.db
      - SESSION_PATH=/app/data/sessions
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=ravenpassword
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  raven-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "4000:4000"
    environment:
      - NEXT_PUBLIC_CORE_WS_URL=ws://localhost:4001/ws
      - NEXT_PUBLIC_CORE_API_URL=http://localhost:4001/api
      - CORE_INTERNAL_URL=http://raven-core:4001
    depends_on:
      raven-core:
        condition: service_healthy
    restart: unless-stopped

volumes:
  neo4j_data:
