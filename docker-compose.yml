version: '3.8'

services:
  raven-core:
    build:
      context: .
      dockerfile: Dockerfile.core
    ports:
      - "4001:4001"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/raven.db
      - SESSION_PATH=/app/data/sessions
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  raven-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "4000:4000"
    environment:
      - NEXT_PUBLIC_CORE_WS_URL=ws://localhost:4001/ws
      - NEXT_PUBLIC_CORE_API_URL=http://localhost:4001/api
      - CORE_INTERNAL_URL=http://raven-core:4001
    depends_on:
      raven-core:
        condition: service_healthy
    restart: unless-stopped
