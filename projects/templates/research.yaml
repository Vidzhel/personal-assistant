name: research
displayName: Research Topic
description: Research a topic and produce a summary report

params:
  topic:
    type: string
    required: true
    description: The topic to research

trigger:
  - type: manual

plan:
  approval: auto
  parallel: false

tasks:
  - id: research-topic
    type: agent
    title: "Research: {{ topic }}"
    prompt: "Research the topic '{{ topic }}' thoroughly and produce a concise summary with key findings, sources, and recommendations."
    blockedBy: []
